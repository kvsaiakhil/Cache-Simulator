name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show compiler
        run: g++ --version

      - name: Build demo
        run: make all

      - name: Run tests
        run: make test
